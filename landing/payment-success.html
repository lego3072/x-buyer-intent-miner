<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment Success | X Buyer-Intent Miner</title>
  <style>
    :root { --bg:#061628; --card:#0d253b; --line:#275a7b; --txt:#e9f4ff; --muted:#a6c7dd; --ok:#22d3ee; --ok2:#34d399; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,sans-serif; background:radial-gradient(1200px 700px at 80% -20%,#1b3250 0%,var(--bg) 55%); color:var(--txt); }
    main { max-width:760px; margin:0 auto; padding:26px 16px 80px; }
    .card { background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02)); border:1px solid var(--line); border-radius:18px; padding:18px; }
    h1 { margin:0 0 10px; font-size:30px; line-height:1.05; }
    p { margin:0 0 10px; color:var(--muted); line-height:1.45; }
    .row { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    input { flex:1; min-width:220px; border-radius:10px; border:1px solid #357095; background:#081c30; color:#e8f3ff; padding:11px 12px; }
    button,a.btn { border-radius:10px; border:1px solid var(--line); padding:10px 13px; font-weight:700; text-decoration:none; }
    button.primary,a.primary { background:linear-gradient(135deg,var(--ok),var(--ok2)); color:#04202a; border:none; }
    button.secondary,a.secondary { background:transparent; color:#d5ecff; }
    .status { margin-top:12px; border:1px dashed #3b779b; border-radius:12px; padding:10px; font-size:13px; color:#d6ecff; white-space:pre-wrap; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Payment received. Start using X Buyer-Intent Miner now.</h1>
      <p>Enter the same work email used at checkout. We'll verify activation and send your access key immediately.</p>
      <div class="row">
        <input id="email" type="email" autocomplete="email" placeholder="you@company.com" />
        <button id="verify" class="primary">Verify Access</button>
      </div>
      <div class="row">
        <button id="send-key" class="secondary">Send/Resend API Key</button>
        <a class="btn secondary" href="/docs-page">Open Docs</a>
        <a class="btn secondary" href="/">Back Home</a>
      </div>
      <div id="status" class="status">Awaiting verification.</div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const emailEl = document.getElementById('email');
    const verifyBtn = document.getElementById('verify');
    const sendBtn = document.getElementById('send-key');
    const EMAIL_KEY = 'dw_checkout_email';

    function setStatus(msg) { statusEl.textContent = msg; }
    function getEmail() {
      const raw = (emailEl.value || localStorage.getItem(EMAIL_KEY) || '').trim().toLowerCase();
      if (raw) localStorage.setItem(EMAIL_KEY, raw);
      return raw;
    }

    async function track(event, source='payment_success') {
      try {
        await fetch('/api/public/event', {
          method:'POST',
          headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({ event, source })
        });
      } catch (_) {}
    }

    async function verify() {
      const email = getEmail();
      if (!email || !email.includes('@')) {
        setStatus('Enter a valid work email used at checkout.');
        return;
      }
      setStatus('Checking billing status...');
      try {
        const res = await fetch(`/v1/billing/status?email=${encodeURIComponent(email)}`, { cache:'no-store' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'status check failed');
        if (data.found && (data.status === 'active' || data.status === 'trialing')) {
          await track('checkout_completed');
          setStatus(`Account active. Plan: ${data.plan || 'active'}.
Use your API key in x-api-key header.
If key is missing, click Send/Resend API Key.`);
        } else if (data.found) {
          setStatus(`Account found with status: ${data.status}.
Activation may still be processing; click Send/Resend API Key in 30-60 seconds.`);
        } else {
          setStatus('No billing record found for this email yet. Confirm you used this email at checkout.');
        }
      } catch (err) {
        setStatus(`Unable to verify right now: ${err.message}`);
      }
    }

    async function sendKey() {
      const email = getEmail();
      if (!email || !email.includes('@')) {
        setStatus('Enter the checkout email first.');
        return;
      }
      setStatus('Requesting access key email...');
      try {
        const res = await fetch('/api/public/access-key', {
          method:'POST',
          headers: { 'Content-Type':'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'access key request failed');
        setStatus('If account is active, access key email has been sent. Check inbox/spam.');
      } catch (err) {
        setStatus(`Unable to send key: ${err.message}`);
      }
    }

    verifyBtn.addEventListener('click', verify);
    sendBtn.addEventListener('click', sendKey);

    const remembered = localStorage.getItem(EMAIL_KEY) || '';
    if (remembered) emailEl.value = remembered;
    track('landing_view', 'payment_success_page');
  </script>
<a href="https://dataweaveai.com" class="dwai-company-badge" aria-label="A DataWeaveAI Inc Company">A DataWeaveAI Inc Company</a>

  position:fixed;

  border-radius:999px;
  font-size:12px;
  font-weight:600;
  line-height:1.2;

  backdrop-filter:blur(6px);

  -webkit-font-smoothing:antialiased;

  }
}
</style>

</body>
</html>
